<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 52px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #111827; }
