      .rootText { font: 700 40px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .roleText { font: 700 38px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #1d4ed8; text-anchor: middle; dominant-baseline: middle; }
      .moduleText { font: 700 36px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #111827; dominant-baseline: middle; }
      .subText { font: 32px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #374151; text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-linecap: round; }
